# основной сайт -> Laravel

server {
    listen 80;
    server_name trip-ping.local localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name trip-ping.local localhost;

    ssl_certificate     /etc/nginx/certs/tripping.crt;
    ssl_certificate_key /etc/nginx/certs/tripping.key;

    root /var/www/html/public;
    index index.php;

    resolver 127.0.0.11 valid=10s;

    location /ws {
        set $up_ws http://fastapi:8000;
        proxy_pass         $up_ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    location /api/ {
        set $up_api http://fastapi:8000;
        proxy_pass       $up_api;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   laravel:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}
